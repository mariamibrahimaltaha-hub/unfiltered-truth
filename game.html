<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deliver the Vape</title>
<style>
body { margin:0; background:#0a0a0f; color:#f0f0f8; font-family:sans-serif; text-align:center; }
h1 { font-size:2.5rem; margin:2rem 0 0.5rem; }
h1 span { color:#ff2d55; }
p { color:#888; margin:0.5rem auto; max-width:320px; line-height:1.6; }
.warn { background:rgba(255,45,85,0.1); border:1px solid rgba(255,45,85,0.3); border-radius:12px; padding:1rem; margin:1.5rem auto; max-width:320px; color:#ff7788; font-size:0.9rem; }
button { background:linear-gradient(135deg,#ff2d55,#ff6b35); color:white; border:none; padding:1rem 2.5rem; border-radius:12px; font-size:1.1rem; font-weight:700; cursor:pointer; margin:0.5rem; }
.btn2 { background:transparent; border:1.5px solid #00e5ff; color:#00e5ff; }
#start, #result { padding:2rem 1rem; }
#game { display:none; padding:0.5rem; }
canvas { border-radius:12px; background:#0d0d1a; display:block; margin:0 auto; border:1px solid #222; touch-action:none; max-width:100%; }
#result { display:none; }
.fact { background:rgba(255,45,85,0.08); border:1px solid rgba(255,45,85,0.2); border-radius:12px; padding:1rem; margin:1rem auto; max-width:320px; color:#ff7788; font-size:0.85rem; text-align:left; }
</style>
</head>
<body>

<div id="start">
  <h1>Deliver the <span>Vape</span></h1>
  <p>Guide the vape to the character. Watch what happens.</p>
  <div class="warn">⚠️ Spoiler: The character always dies.<br>There's no way to win. That's the point.</div>
  <button onclick="startGame()">Play 😈</button><br>
  <button class="btn2" onclick="location.href='index.html'">← Back</button>
</div>

<div id="game">
  <p style="color:#555;font-size:0.8rem;margin:0.5rem">Drag to move the vape ☠️</p>
  <canvas id="c"></canvas>
</div>

<div id="result">
  <div style="font-size:4rem">💀</div>
  <h1 style="margin:0.5rem 0">They're Gone.</h1>
  <p>You delivered the vape. There was no other ending.</p>
  <div class="fact" id="rf"></div>
  <button onclick="startGame()">Try Again 😅</button>
  <button class="btn2" onclick="location.href='index.html'">← Back</button>
</div>

<script>
var facts = [
  "💡 E-cigarettes contain 2,500+ chemicals — no safe amount.",
  "💡 Nicotine in vapes is 3x stronger than regular cigarettes.",
  "💡 72% of vapers started before age 18.",
  "💡 Even nicotine-free vapes contain formaldehyde — a carcinogen.",
  "💡 Vaping rewires your brain — addiction happens fast.",
  "💡 EVALI is a deadly vaping lung disease killing young people."
];

var canvas, ctx, W, H, vape, ch, running, animId;
var ptr = null, attract = false;
var delivery = false, dTimer = 0;

function show(id) {
  document.getElementById('start').style.display = 'none';
  document.getElementById('game').style.display = 'none';
  document.getElementById('result').style.display = 'none';
  document.getElementById(id).style.display = 'block';
}

function startGame() {
  show('game');
  canvas = document.getElementById('c');
  ctx = canvas.getContext('2d');
  W = canvas.width = Math.min(window.innerWidth - 20, 460);
  H = canvas.height = Math.min(window.innerHeight * 0.65, 400);
  vape = { x:30, y:30, vx:0, vy:0, r:0 };
  ch = { x:W/2, y:H/2, stage:0, blink:0, sweat:0, shake:0 };
  running = true; delivery = false; dTimer = 0;
  canvas.ontouchstart = function(e) { e.preventDefault(); var r=canvas.getBoundingClientRect(); ptr={x:e.touches[0].clientX-r.left,y:e.touches[0].clientY-r.top}; attract=true; };
  canvas.ontouchmove = function(e) { e.preventDefault(); var r=canvas.getBoundingClientRect(); ptr={x:e.touches[0].clientX-r.left,y:e.touches[0].clientY-r.top}; };
  canvas.ontouchend = function(e) { e.preventDefault(); attract=false; ptr=null; };
  canvas.onmousemove = function(e) { var r=canvas.getBoundingClientRect(); ptr={x:e.clientX-r.left,y:e.clientY-r.top}; attract=true; };
  cancelAnimationFrame(animId);
  loop();
}

function dst(a,b) { return Math.sqrt((a.x-b.x)*(a.x-b.x)+(a.y-b.y)*(a.y-b.y)); }

function update() {
  if (!running) return;
  ch.blink = (ch.blink+1)%120;
  if (ch.shake>0) ch.shake*=0.8;
  var dd=dst(vape,ch);
  ch.stage = dd>200?0:dd>120?1:2;
  ch.sweat = dd<180?Math.min(1,ch.sweat+0.02):Math.max(0,ch.sweat-0.01);
  if (dd<70) ch.shake=6;
  if (attract && ptr) { var dx=ptr.x-vape.x,dy=ptr.y-vape.y,d2=Math.sqrt(dx*dx+dy*dy)+0.001; vape.vx+=dx/d2*1.5; vape.vy+=dy/d2*1.5; }
  var adx=ch.x-vape.x,ady=ch.y-vape.y,ad=Math.sqrt(adx*adx+ady*ady)+0.001;
  vape.vx+=adx/ad*0.4; vape.vy+=ady/ad*0.4;
  vape.vx*=0.87; vape.vy*=0.87;
  var vs=Math.sqrt(vape.vx*vape.vx+vape.vy*vape.vy);
  if(vs>8){vape.vx*=8/vs;vape.vy*=8/vs;}
  vape.x+=vape.vx; vape.y+=vape.vy;
  vape.r=Math.atan2(vape.vy,vape.vx)+Math.PI/2;
  vape.x=Math.max(12,Math.min(W-12,vape.x));
  vape.y=Math.max(12,Math.min(H-12,vape.y));
  if (dst(vape,ch)<24 && !delivery) {
    ch.stage=3; running=false; delivery=true;
    setTimeout(function(){ document.getElementById('rf').textContent=facts[Math.floor(Math.random()*facts.length)]; show('result'); },1800);
  }
}

function drawChar(c) {
  var sx=c.shake?(Math.random()-.5)*c.shake:0, sy=c.shake?(Math.random()-.5)*c.shake:0;
  var x=c.x+sx, y=c.y+sy;
  ctx.fillStyle=['#4fc3f7','#ffeb3b','#ff9800','#555'][c.stage];
  ctx.beginPath(); ctx.rect(x-11,y-4,22,32,6); ctx.fill();
  ctx.fillStyle=['#ffe0b2','#fff176','#ffcc80','#999'][c.stage];
  ctx.beginPath(); ctx.arc(x,y-16,15,0,Math.PI*2); ctx.fill();
  if (c.stage<3) {
    ctx.fillStyle='#333';
    if(c.blink<105){ctx.beginPath();ctx.arc(x-5,y-18,2.5,0,Math.PI*2);ctx.arc(x+5,y-18,2.5,0,Math.PI*2);ctx.fill();}
    ctx.strokeStyle='#333'; ctx.lineWidth=1.8; ctx.beginPath();
    if(c.stage===0) ctx.arc(x,y-11,5,0,Math.PI);
    else if(c.stage===1){ctx.moveTo(x-5,y-10);ctx.lineTo(x+5,y-10);}
    else ctx.arc(x,y-7,5,Math.PI,0);
    ctx.stroke();
    if(c.sweat>0.4){ctx.fillStyle='rgba(100,180,255,'+c.sweat*0.8+')';ctx.beginPath();ctx.ellipse(x+13,y-24,2.5,4,0.3,0,Math.PI*2);ctx.fill();}
  } else {
    ctx.strokeStyle='#aaa'; ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(x-8,y-22);ctx.lineTo(x-2,y-15);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x-2,y-22);ctx.lineTo(x-8,y-15);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x+2,y-22);ctx.lineTo(x+8,y-15);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x+8,y-22);ctx.lineTo(x+2,y-15);ctx.stroke();
  }
}

function drawVape(v) {
  ctx.save(); ctx.translate(v.x,v.y); ctx.rotate(v.r);
  ctx.fillStyle='#1a1a2e'; ctx.strokeStyle='#00e5ff'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.rect(-6,-14,12,30,4); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#ff2d55'; ctx.beginPath(); ctx.arc(0,-12,4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(150,220,255,0.12)'; ctx.beginPath(); ctx.arc(0,-21,6,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawBoom() {
  dTimer++;
  var p=dTimer/60;
  for(var i=0;i<3;i++){var r=(p+i*0.1)*80,a=Math.max(0,1-p-i*0.1);ctx.strokeStyle='rgba(255,45,85,'+a+')';ctx.lineWidth=3;ctx.beginPath();ctx.arc(ch.x,ch.y,r,0,Math.PI*2);ctx.stroke();}
}

function draw() {
  ctx.clearRect(0,0,W,H);
  ctx.strokeStyle='rgba(255,255,255,0.02)'; ctx.lineWidth=1;
  for(var x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(var y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  drawChar(ch);
  if(!delivery) drawVape(vape); else drawBoom();
}

function loop() { update(); draw(); animId=requestAnimationFrame(loop); }
show('start');
</script>
</body>
</html>
